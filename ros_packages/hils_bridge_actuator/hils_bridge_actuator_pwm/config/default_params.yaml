hils_pwm_bridge:
  ros__parameters:
    serial_port: /dev/ttyACM0
    baudrate: 115200
    max_hz: 50.0
    joint_state_topic: /joint_states
    servo_channels: 4
    encoder_cpr: 1000
    servo_min_angle: -1.5708    # -pi/2
    servo_max_angle: 1.5708     # pi/2
    servo_min_pulse_us: 500
    servo_max_pulse_us: 2500
    joint_names: ['']           # Empty = use positional index
