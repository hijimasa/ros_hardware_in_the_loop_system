/**:
  ros__parameters:
    # ROS topics to subscribe
    pointcloud_topic: "/livox/lidar"
    imu_topic: "/livox/imu"

    # Enable IMU data forwarding
    enable_imu: true

    # Max point cloud publish rate (Hz) - matches livox_ros_driver2 default
    max_hz: 10.0

    # Max points per frame (no USB bandwidth limit in direct UDP mode)
    # Mid360: ~200k pts/s. At 10 Hz = ~20k pts/frame.
    max_points_per_frame: 20000

    # Point data type: 1=CartesianHigh (14 bytes/pt), 2=CartesianLow (8 bytes/pt)
    point_data_type: 1

    # Downsample mode: "uniform" (even spacing) or "near" (closest points first)
    downsample_mode: "uniform"

    # Network config
    # lidar_ip: IP assigned to the network interface acting as the emulated LiDAR
    # host_ip: Robot PC IP where livox_ros_driver2 runs
    # network_interface: Network interface to bind (e.g. "eth1"). Empty = auto from lidar_ip.
    lidar_ip: "192.168.1.12"
    host_ip: "192.168.1.5"
    serial_number: "0TFDFH600100511"
    network_interface: ""
