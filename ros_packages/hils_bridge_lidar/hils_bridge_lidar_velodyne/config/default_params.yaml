/**:
  ros__parameters:
    # ROS topic to subscribe
    pointcloud_topic: "/velodyne_points"

    # Max point cloud publish rate (Hz) - VLP-16 spins at 5-20 Hz, default 10 Hz
    max_hz: 10.0

    # Max points per frame
    # VLP-16: ~300k pts/s single return. At 10 Hz = ~30k pts/frame.
    max_points_per_frame: 30000

    # Return mode: 0x37=Strongest, 0x38=Last, 0x39=Dual
    return_mode: 0x37

    # Downsample mode: "uniform" (even spacing) or "near" (closest points first)
    downsample_mode: "uniform"

    # Network config
    # device_ip: IP assigned to the network interface acting as the emulated VLP-16
    # host_ip: Robot PC IP where velodyne_driver runs
    # network_interface: Network interface to bind (e.g. "eth1"). Empty = auto from device_ip.
    device_ip: "192.168.1.201"
    host_ip: "192.168.1.100"
    network_interface: ""
